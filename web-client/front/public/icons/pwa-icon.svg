<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#1DB954" rx="64"/>

  <!-- Dumbbell Icon -->
  <g transform="translate(256, 256)">
    <!-- Left Weight -->
    <rect x="-180" y="-60" width="60" height="120" rx="10" fill="white"/>
    <rect x="-185" y="-80" width="70" height="20" rx="5" fill="white"/>
    <rect x="-185" y="60" width="70" height="20" rx="5" fill="white"/>

    <!-- Bar -->
    <rect x="-120" y="-15" width="240" height="30" rx="15" fill="white"/>

    <!-- Center Grip -->
    <rect x="-40" y="-20" width="80" height="40" rx="5" fill="white" opacity="0.9"/>
    <line x1="-30" y1="-20" x2="-30" y2="20" stroke="#1DB954" stroke-width="4"/>
    <line x1="-15" y1="-20" x2="-15" y2="20" stroke="#1DB954" stroke-width="4"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#1DB954" stroke-width="4"/>
    <line x1="15" y1="-20" x2="15" y2="20" stroke="#1DB954" stroke-width="4"/>
    <line x1="30" y1="-20" x2="30" y2="20" stroke="#1DB954" stroke-width="4"/>

    <!-- Right Weight -->
    <rect x="120" y="-60" width="60" height="120" rx="10" fill="white"/>
    <rect x="115" y="-80" width="70" height="20" rx="5" fill="white"/>
    <rect x="115" y="60" width="70" height="20" rx="5" fill="white"/>
  </g>
</svg>
