<div class="profile-edit-container">
  <h1>Editar Perfil</h1>

  <form (ngSubmit)="save(form)" #form="ngForm">
    <!-- Secao: Dados Pessoais -->
    <div class="form-section">
      <h2 class="section-title">Dados Pessoais</h2>

      <div class="form-grid">
        <div class="row full-width">
          <label for="fullName">Nome completo</label>
          <input id="fullName" name="fullName" [(ngModel)]="fullName" required placeholder="Nome Sobrenome" />
        </div>

        <div class="row full-width">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" [(ngModel)]="email" required />
        </div>

        <div class="row">
          <label for="birthDate">Data de Nascimento</label>
          <input id="birthDate" name="birthDate" type="date" [(ngModel)]="birthDate" />
        </div>

        <div class="row">
          <label for="gender">Genero</label>
          <select id="gender" name="gender" [(ngModel)]="gender">
            <option *ngFor="let g of genderOptions" [value]="g.value">{{ g.label }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn-save" [disabled]="isLoading">{{ isLoading ? 'Salvando...' : 'Salvar' }}</button>
      <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="isLoading">Cancelar</button>
    </div>

    <!-- Secao: Segurança -->
    <div class="form-section">
      <h2 class="section-title">Segurança</h2>

      <div class="security-row">
        <div class="security-info">
          <p class="security-label">Senha</p>
          <p class="security-description">Altere sua senha para manter sua conta segura</p>
        </div>
        <button type="button" class="btn-change-password" (click)="openPasswordModal()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
          </svg>
          Alterar Senha
        </button>
      </div>
    </div>

    <!-- Info Box -->
    <div class="info-box mt-6">
      <div class="flex items-start gap-3">
        <svg class="info-icon w-5 h-5 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
          <p class="info-title">Sobre suas informacoes</p>
          <p class="info-text">Mantenha seus dados de perfil atualizados. Essas informacoes sao utilizadas para personalizar sua experiencia na plataforma.</p>
        </div>
      </div>
    </div>

    <div class="danger-row text-center mt-6">
      <button type="button" class="btn-danger" (click)="confirmAndDelete()" [disabled]="isLoading">Excluir Conta</button>
    </div>
  </form>
</div>

<!-- Modal de Alteração de Senha -->
<div *ngIf="showPasswordModal" class="modal-overlay" (click)="closePasswordModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Alterar Senha</h3>
      <button type="button" class="modal-close" (click)="closePasswordModal()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="currentPassword">Senha Atual</label>
        <input
          type="password"
          id="currentPassword"
          [(ngModel)]="currentPassword"
          placeholder="Digite sua senha atual"
        />
      </div>

      <div class="form-group">
        <label for="newPassword">Nova Senha</label>
        <input
          type="password"
          id="newPassword"
          [(ngModel)]="newPassword"
          placeholder="Mínimo 6 caracteres"
        />
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">Confirmar Nova Senha</label>
        <input
          type="password"
          id="confirmNewPassword"
          [(ngModel)]="confirmNewPassword"
          placeholder="Repita a nova senha"
        />
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="closePasswordModal()" [disabled]="changingPassword">
        Cancelar
      </button>
      <button type="button" class="btn-save" (click)="changePassword()" [disabled]="changingPassword">
        {{ changingPassword ? 'Alterando...' : 'Alterar Senha' }}
      </button>
    </div>
  </div>
</div>
