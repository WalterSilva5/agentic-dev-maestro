<div class="members-page p-4 md:p-6">
  <h1 class="text-xl font-semibold text-dark-text mb-4">Membros</h1>

  <!-- Sem empresa ativa -->
  <div *ngIf="cid == null" class="alert bg-dark-surface border border-dark-border text-dark-text">
    <span>Selecione uma empresa primeiro</span>
    <a routerLink="/companies" class="btn btn-sm btn-primary">Ir para empresas</a>
  </div>

  <ng-container *ngIf="cid != null">
    <!-- Formulário de adição -->
    <div class="card bg-dark-surface border border-dark-border mb-6">
      <div class="card-body p-4">
        <h2 class="card-title text-base text-dark-text">Adicionar membro</h2>
        <form (ngSubmit)="add()" class="flex flex-col md:flex-row gap-3 md:items-end">
          <div class="form-control flex-1">
            <label class="label py-1"><span class="label-text text-grayscale-5">E-mail</span></label>
            <input
              type="email"
              name="newEmail"
              [(ngModel)]="newEmail"
              placeholder="usuario@empresa.com"
              class="input input-bordered bg-dark-bg text-dark-text w-full"
              autocomplete="off"
            />
          </div>
          <div class="form-control">
            <label class="label py-1"><span class="label-text text-grayscale-5">Papel</span></label>
            <select name="newRole" [(ngModel)]="newRole" class="select select-bordered bg-dark-bg text-dark-text">
              <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" [disabled]="adding">
            <span *ngIf="adding" class="loading loading-spinner loading-sm"></span>
            Adicionar
          </button>
        </form>
      </div>
    </div>

    <!-- Tabela -->
    <div class="overflow-x-auto rounded-card border border-dark-border bg-dark-surface">
      <table class="table">
        <thead>
          <tr class="text-grayscale-5">
            <th>Nome</th>
            <th>E-mail</th>
            <th>Papel</th>
            <th class="text-right">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
            <td colspan="4" class="text-center text-grayscale-4 py-6">
              <span class="loading loading-spinner loading-md"></span>
            </td>
          </tr>

          <tr *ngIf="!loading && members.length === 0">
            <td colspan="4" class="text-center text-grayscale-4 py-6">Nenhum membro cadastrado.</td>
          </tr>

          <tr *ngFor="let m of members" class="hover:bg-dark-hover">
            <td class="text-dark-text">{{ fullName(m) }}</td>
            <td class="text-grayscale-5">{{ m.user?.email }}</td>
            <td>
              <select
                class="select select-bordered select-sm bg-dark-bg text-dark-text"
                [ngModel]="m.role"
                (ngModelChange)="onRoleChange(m, $event)"
                [name]="'role-' + m.id"
              >
                <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
              </select>
            </td>
            <td class="text-right">
              <button type="button" class="btn btn-sm btn-error btn-outline" (click)="remove(m)">Remover</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
