<div class="forgot-page">
  <!-- Background decoration (hidden for flat design) -->
  <div class="bg-decoration" style="display: none;">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <div class="forgot-container">
    <!-- Back button -->
    <button type="button" class="back-button" (click)="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Voltar
    </button>

    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5h11"></path>
          <path d="M6.5 17.5h11"></path>
          <path d="M4 10v4"></path>
          <path d="M7 8v8"></path>
          <path d="M17 8v8"></path>
          <path d="M20 10v4"></path>
        </svg>
      </div>
      <h1 class="brand-name">Template</h1>
    </div>

    <!-- Content based on state -->
    <div *ngIf="!emailSent" class="form-content">
      <div class="form-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0110 0v4"></path>
          </svg>
        </div>
        <h2>Esqueceu sua senha?</h2>
        <p>Digite seu email e enviaremos instrucoes para redefinir sua senha.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="forgot-form" autocomplete="off">
        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper" [class.has-error]="form.get('email')?.invalid && form.get('email')?.touched">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="seu@email.com"
              aria-label="Email"
            />
          </div>
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error-message">
            <span *ngIf="form.get('email')?.errors?.['required']">Email e obrigatorio</span>
            <span *ngIf="form.get('email')?.errors?.['email']">Email invalido</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-primary"
          [disabled]="form.invalid || isLoading"
        >
          <svg *ngIf="!isLoading" class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <span *ngIf="!isLoading">Enviar Email</span>
          <span *ngIf="isLoading" class="loading-spinner"></span>
        </button>
      </form>
    </div>

    <!-- Success state -->
    <div *ngIf="emailSent" class="success-content">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
      <h2>Verifique seu email</h2>
      <p>Enviamos instrucoes de recuperacao de senha para o email informado.</p>
      <p class="hint">Nao recebeu? Verifique sua caixa de spam ou tente novamente.</p>

      <button type="button" class="btn-secondary" (click)="emailSent = false">
        Tentar novamente
      </button>

      <button type="button" class="btn-primary" routerLink="/auth/login">
        Voltar para Login
      </button>
    </div>
  </div>
</div>
